<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>UCR Star 2</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css"
    >
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <div id="map"></div>

    <section class="search-shell" aria-label="Dataset search">
      <form id="search-form" class="search-form" autocomplete="off">
        <input
          id="search-input"
          type="search"
          name="q"
          placeholder="Search datasets"
          aria-label="Search datasets"
        >
        <button type="submit">Search</button>
      </form>
      <div id="suggestions" class="suggestions" hidden></div>
    </section>

    <aside id="side-panel" class="side-panel" hidden>
      <div class="panel-header">
        <h1 id="panel-title">Datasets</h1>
        <button id="close-panel" type="button" aria-label="Close panel">x</button>
      </div>
      <div id="panel-content" class="panel-content"></div>
    </aside>

    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
