<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MVT Viewer - UCR★STAR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://unpkg.com/maplibre-gl@3.6.0/dist/maplibre-gl.css" rel="stylesheet">
  <script src="https://unpkg.com/maplibre-gl@3.6.0/dist/maplibre-gl.js"></script>
  <link rel="stylesheet" href="/static/index.css">
</head>
<body>
  <div class="app">

    <form class="map-search" id="searchForm" autocomplete="off">
      <input type="search" class="search-input" placeholder="Search datasets" id="searchInput" aria-label="Search datasets">
      <button class="clear-search-btn" id="clearSearch" type="button" title="Clear search" aria-label="Clear search" hidden>&#215;</button>
      <button class="search-btn" id="searchButton" type="submit" title="Search" aria-label="Search">&#128269;</button>
      <div class="quick-results" id="quickResults" hidden></div>
    </form>

    <aside class="left-panel" id="leftPanel" aria-label="Dataset panel">
      <div class="panel-head">
        <button class="panel-back" id="backToResults" type="button" aria-label="Back to search results" hidden>&#8592;</button>
        <div>
          <div class="panel-kicker" id="panelKicker">UCR&#9733;STAR</div>
          <h1 id="panelTitle">Datasets</h1>
        </div>
      </div>
      <div class="panel-content" id="panelContent"></div>
    </aside>

    <!-- ── MAP ──────────────────────────────────────────────────────────── -->
    <div id="map">
      <canvas id="label-canvas"></canvas>

      <!-- Style panel -->
      <div class="style-panel" id="stylePanel">
        <div class="style-header">
          &#127912; Styling Options
          <span class="style-close" onclick="toggleStylePanel()">&#215;</span>
        </div>
        <div class="style-section">
          <label class="style-label">Style by attribute</label>
          <select class="style-select" id="attributeSelect"><option value="">Default style</option></select>
        </div>
        <div class="style-row">
          <div class="style-section">
            <label class="style-label">Visualization</label>
            <select class="style-select" id="vizType">
              <option value="choropleth">Continuous</option>
              <option value="categorical">Categorical</option>
              <option value="size">Size by value</option>
            </select>
          </div>
          <div class="style-section">
            <label class="style-label">Color scheme</label>
            <select class="style-select" id="colorScheme">
              <option value="blues">Blues</option>
              <option value="reds">Reds</option>
              <option value="greens">Greens</option>
              <option value="viridis">Viridis</option>
              <option value="rainbow">Rainbow</option>
            </select>
          </div>
        </div>
        <div class="style-section">
          <label class="style-label">Label attribute</label>
          <select class="style-select" id="labelSelect"><option value="">No labels</option></select>
        </div>
        <div class="style-row">
          <div class="style-section">
            <label class="style-label">Label size</label>
            <select class="style-select" id="labelSize">
              <option value="10">Small</option>
              <option value="12" selected>Medium</option>
              <option value="14">Large</option>
              <option value="16">XL</option>
            </select>
          </div>
          <div class="style-section">
            <label class="style-label">Label color</label>
            <input type="color" class="style-input" id="labelColor" value="#202124" style="height:38px;padding:4px 6px;cursor:pointer;">
          </div>
        </div>
        <div class="style-row">
          <div class="style-section">
            <label class="style-label">Min zoom</label>
            <select class="style-select" id="labelMinZoom">
              <option value="0">Always</option>
              <option value="5">5+</option>
              <option value="7">7+</option>
              <option value="9">9+</option>
              <option value="11">11+</option>
              <option value="13" selected>13+</option>
            </select>
          </div>
          <div class="style-section">
            <label class="style-label">Background</label>
            <select class="style-select" id="labelBg">
              <option value="none">None</option>
              <option value="white" selected>White</option>
              <option value="dark">Dark</option>
              <option value="color">Color match</option>
            </select>
          </div>
        </div>
        <button class="style-reset-btn" type="button" onclick="resetStyleToServerDefault()">Reset to server default</button>
        <button class="apply-style-btn" onclick="applyStyle()">Apply Style</button>
      </div>

      <!-- Legend -->
      <div class="legend" id="legend">
        <div class="legend-title">Legend</div>
        <div id="legendContent"></div>
      </div>

      <div class="goto-box">
        <div class="goto-input-group">
          <input type="text" class="goto-input" id="gotoInput" placeholder="Lat, Lng or place name" autocomplete="off">
          <button class="goto-btn" id="gotoBtn">Go</button>
        </div>
        <div class="goto-results" id="gotoResults"></div>
      </div>

      <!-- Map controls -->
      <div class="map-controls">
        <button class="zoom-btn" id="baseLayerBtn" title="Toggle Basemap" aria-label="Toggle basemap">🗺</button>
        <button class="zoom-btn" id="zoomAllBtn" title="Zoom All" aria-label="Zoom to dataset">⤢</button>
        <button class="zoom-btn" id="zoomIn"  title="Zoom In">+</button>
        <button class="zoom-btn" id="zoomOut" title="Zoom Out">&#8722;</button>
        <button class="zoom-btn" title="Styling Options" onclick="toggleStylePanel()">&#127912;</button>
      </div>
    </div><!-- #map -->
  </div><!-- .app -->

  <!-- ── OLLAMA AI ASSISTANT ────────────────────────────────────────────── -->
  <button class="ai-fab" id="aiFab" title="AI Style Assistant (Ollama)">&#129302;</button>

  <div class="ai-panel" id="aiPanel">
    <div class="ai-head">
      <div>
        <div class="ai-head-title">&#129302; AI Style Assistant</div>
        <div class="ai-head-sub">Ollama &middot; 100% local &middot; free</div>
      </div>
      <span class="ai-head-x" onclick="aiToggle()">&#215;</span>
    </div>
    <div class="ai-model-bar">
      <span class="ai-model-label">Modelo</span>
      <select class="ai-model-select" id="aiModelSelect">
        <option value="llama3.2">llama3.2</option>
        <option value="llama3.1">llama3.1</option>
        <option value="llama3">llama3</option>
        <option value="mistral">mistral</option>
        <option value="gemma2">gemma2</option>
        <option value="qwen2.5">qwen2.5</option>
        <option value="phi3">phi3</option>
        <option value="deepseek-r1">deepseek-r1</option>
      </select>
      <div class="ai-status-dot" id="aiStatusDot" title="Ollama status"></div>
    </div>
    <div class="ai-chips">
      <button class="ai-chip" onclick="aiQuick('describe')">&#128269; Describe</button>
      <button class="ai-chip" onclick="aiQuick('suggest')">&#128161; Suggest style</button>
      <button class="ai-chip" onclick="aiQuick('best')">&#128506; Best attribute</button>
      <button class="ai-chip" onclick="aiQuick('insight')">&#128202; Insights</button>
      <button class="ai-chip" onclick="aiQuick('anomaly')">&#9888; Anomalies</button>
    </div>
    <div class="ai-msgs" id="aiMsgs">
      <div class="ai-msg info">
        Make sure <strong>Ollama</strong> is running:<br>
        <code>OLLAMA_ORIGINS="*" ollama serve</code><br>
        Then select a dataset and ask me anything.
      </div>
    </div>
    <button class="ai-apply-btn" id="aiApplyBtn" onclick="aiApplyStyle()">
      &#9889; Apply suggested style
    </button>
    <div class="ai-input-row">
      <input class="ai-in" type="text" id="aiIn"
        placeholder="e.g. color counties by land area using blues..."
        autocomplete="off">
      <button class="ai-send-btn" id="aiSendBtn" onclick="aiSend()">&#9654;</button>
    </div>
  </div>

  <!-- Dark mode toggle -->
  <button id="darkToggle" class="theme-toggle" title="Toggle Dark Mode">&#127769;</button>

  <script src="/static/index.js"></script>
</body>
</html>
